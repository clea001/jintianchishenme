<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>今天吃什么</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #FF6B35;
  --primary-light: #FF8F5E;
  --bg: #FFF8F0;
  --card: #FFFFFF;
  --text: #2D2D2D;
  --text-light: #888;
  --danger: #E74C3C;
  --success: #27AE60;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(255,107,53,0.3);
}
.header h1 { font-size: 22px; font-weight: 700; }
.header .date { font-size: 13px; opacity: 0.9; margin-top: 4px; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid #f0e8e0;
  position: sticky;
  top: 62px;
  z-index: 99;
}
.tab {
  flex: 1;
  padding: 14px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-light);
  border: none;
  background: none;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.tab.active { color: var(--primary); font-weight: 600; }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 3px;
  background: var(--primary);
  border-radius: 2px;
}

/* Page containers */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* Record button */
.fab {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 28px;
  box-shadow: 0 4px 16px rgba(255,107,53,0.4);
  cursor: pointer;
  z-index: 50;
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fab:active { transform: scale(0.9); }

/* Meal card */
.meal-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.meal-card .meal-time {
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 6px;
}
.meal-card .meal-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.meal-card .meal-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 12px;
  margin-top: 8px;
}
.meal-card .meal-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}
.tag-breakfast { background: #FFF3E0; color: #E65100; }
.tag-lunch { background: #E8F5E9; color: #2E7D32; }
.tag-dinner { background: #E3F2FD; color: #1565C0; }
.tag-snack { background: #FCE4EC; color: #C62828; }
.tag-other { background: #F3E5F5; color: #6A1B9A; }

.meal-card .delete-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.06);
  color: var(--text-light);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; line-height: 1.6; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show {
  display: flex;
}
.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal h2 {
  font-size: 20px;
  margin-bottom: 20px;
  text-align: center;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
  color: var(--text);
}
.form-group input[type="text"],
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #e8e0d8;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  background: #FAFAFA;
  font-family: inherit;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--primary);
  background: white;
}
.form-group textarea { resize: vertical; min-height: 60px; }

/* Photo upload */
.photo-upload {
  border: 2px dashed #e0d8d0;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.photo-upload:active { border-color: var(--primary); background: #FFF8F0; }
.photo-upload input { display: none; }
.photo-upload .upload-icon { font-size: 32px; margin-bottom: 8px; }
.photo-upload .upload-text { font-size: 13px; color: var(--text-light); }
.photo-preview {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 8px;
  margin-top: 8px;
  display: none;
}
.photo-upload.has-image .photo-preview { display: block; }
.photo-upload.has-image .upload-icon,
.photo-upload.has-image .upload-text { display: none; }
.remove-photo {
  display: none;
  position: absolute;
  top: 8px;
  right: 8px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 14px;
  cursor: pointer;
}
.photo-upload.has-image .remove-photo { display: flex; align-items: center; justify-content: center; }

/* Tag select */
.tag-options {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.tag-option {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid #e8e0d8;
  background: white;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.tag-option.selected {
  border-color: var(--primary);
  background: #FFF3E0;
  color: var(--primary);
  font-weight: 500;
}

/* Submit button */
.btn-submit {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}
.btn-submit:active { opacity: 0.85; }

.btn-cancel {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: none;
  color: var(--text-light);
  font-size: 14px;
  cursor: pointer;
  margin-top: 4px;
}

/* Wheel page */
.wheel-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
}
.wheel-wrapper {
  position: relative;
  width: 300px;
  height: 320px;
  padding-top: 20px;
}
.wheel-canvas {
  width: 300px;
  height: 300px;
}
.wheel-center {
  position: absolute;
  top: calc(50% + 10px);
  left: 50%;
  transform: translate(-50%, -50%);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--card);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  z-index: 5;
}

.btn-spin {
  margin-top: 30px;
  padding: 14px 48px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,107,53,0.3);
  transition: transform 0.15s;
}
.btn-spin:active { transform: scale(0.95); }
.btn-spin:disabled { opacity: 0.6; cursor: not-allowed; }

.wheel-result {
  margin-top: 24px;
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
  text-align: center;
  min-height: 32px;
}

/* Wheel food list */
.wheel-foods {
  margin-top: 30px;
  width: 100%;
  max-width: 340px;
}
.wheel-foods h3 {
  font-size: 15px;
  margin-bottom: 12px;
  color: var(--text);
}
.food-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.food-input-row input {
  flex: 1;
  padding: 10px 12px;
  border: 1.5px solid #e8e0d8;
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
.food-input-row input:focus { border-color: var(--primary); }
.food-input-row button {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
}

.food-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.food-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: white;
  border: 1.5px solid #e8e0d8;
  border-radius: 20px;
  font-size: 14px;
}
.food-tag .remove-food {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: none;
  background: #eee;
  color: #999;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Stats page */
.stats-card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.stats-card h3 {
  font-size: 15px;
  margin-bottom: 12px;
  color: var(--text);
}
.stats-number {
  font-size: 36px;
  font-weight: 700;
  color: var(--primary);
}
.stats-label {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 2px;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.history-list { margin-top: 16px; }
.history-date {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  margin: 16px 0 8px;
}

/* Toast */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  padding: 10px 24px;
  background: #333;
  color: white;
  border-radius: 20px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Update banner */
.update-banner {
  display: none;
  background: linear-gradient(135deg, #4CAF50, #66BB6A);
  color: white;
  padding: 12px 16px;
  position: sticky;
  top: 0;
  z-index: 150;
  animation: slideDown 0.3s ease;
}
.update-banner.show { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
@keyframes slideDown {
  from { transform: translateY(-100%); }
  to { transform: translateY(0); }
}
.update-banner .update-info { flex: 1; }
.update-banner .update-title { font-size: 14px; font-weight: 600; }
.update-banner .update-desc { font-size: 12px; opacity: 0.9; margin-top: 2px; }
.update-banner .btn-update {
  padding: 8px 18px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #4CAF50;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.update-banner .btn-close-update {
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Update progress */
.update-progress {
  display: none;
  position: fixed;
  bottom: 80px;
  left: 16px;
  right: 16px;
  background: var(--card);
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 160;
}
.update-progress.show { display: block; }
.update-progress .progress-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.update-progress .progress-bar-bg {
  height: 6px;
  background: #eee;
  border-radius: 3px;
  overflow: hidden;
}
.update-progress .progress-bar {
  height: 100%;
  background: #4CAF50;
  border-radius: 3px;
  width: 0%;
  transition: width 0.3s;
}
.update-progress .progress-text { font-size: 12px; color: #999; margin-top: 6px; text-align: right; }

/* Social / Friends */
.social-empty { text-align: center; padding: 40px 20px; color: var(--text-light); }
.social-empty .icon { font-size: 40px; margin-bottom: 10px; }

.profile-card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  text-align: center;
}
.profile-card .nickname { font-size: 20px; font-weight: 700; }
.profile-card .invite-code {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 20px;
  background: #FFF3E0;
  color: var(--primary);
  border-radius: 20px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  font-family: monospace;
}
.profile-card .copy-btn {
  margin-top: 10px;
  padding: 8px 24px;
  border: 1.5px solid var(--primary);
  border-radius: 20px;
  background: white;
  color: var(--primary);
  font-size: 13px;
  cursor: pointer;
}

.section-title {
  font-size: 15px;
  font-weight: 600;
  margin: 16px 0 10px;
  color: var(--text);
}

.friend-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  cursor: pointer;
}
.friend-item:active { background: #f9f5f0; }
.friend-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
}
.friend-info { flex: 1; margin-left: 12px; }
.friend-name { font-size: 15px; font-weight: 500; }
.friend-code { font-size: 12px; color: var(--text-light); }
.friend-badge {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--danger);
  color: white;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.add-friend-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.add-friend-row input {
  flex: 1;
  padding: 12px 14px;
  border: 1.5px solid #e8e0d8;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
  font-family: inherit;
  background: #FAFAFA;
}
.add-friend-row input:focus { border-color: var(--primary); background: white; }
.add-friend-row button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}

/* Chat */
.chat-view { display: none; padding: 16px; }
.chat-view.active { display: block; }
.chat-header {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}
.chat-back {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: #f0e8e0;
  font-size: 18px;
  cursor: pointer;
  margin-right: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-title { font-size: 17px; font-weight: 600; }
.chat-messages { min-height: 200px; max-height: 50vh; overflow-y: auto; margin-bottom: 12px; }
.chat-msg {
  margin-bottom: 10px;
  display: flex;
}
.chat-msg.sent { justify-content: flex-end; }
.chat-msg.received { justify-content: flex-start; }
.chat-bubble {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
}
.chat-msg.sent .chat-bubble {
  background: var(--primary);
  color: white;
  border-bottom-right-radius: 4px;
}
.chat-msg.received .chat-bubble {
  background: #f0e8e0;
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.chat-time { font-size: 11px; color: var(--text-light); margin-top: 3px; }
.chat-msg.sent .chat-time { text-align: right; }
.chat-input-row {
  display: flex;
  gap: 8px;
}
.chat-input-row input {
  flex: 1;
  padding: 12px 14px;
  border: 1.5px solid #e8e0d8;
  border-radius: 20px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
.chat-input-row input:focus { border-color: var(--primary); }
.chat-input-row button {
  padding: 12px 16px;
  border: none;
  border-radius: 20px;
  background: var(--primary);
  color: white;
  font-size: 14px;
  cursor: pointer;
}

/* Request card */
.request-card {
  background: var(--card);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}
.request-card .req-header { display: flex; justify-content: space-between; align-items: center; }
.request-card .req-from { font-size: 13px; color: var(--text-light); }
.request-card .req-dish { font-size: 17px; font-weight: 600; margin: 6px 0; }
.request-card .req-actions { display: flex; gap: 8px; margin-top: 8px; }
.request-card .btn-accept {
  padding: 6px 16px;
  border: none;
  border-radius: 16px;
  background: var(--success);
  color: white;
  font-size: 13px;
  cursor: pointer;
}
.request-card .btn-decline {
  padding: 6px 16px;
  border: 1.5px solid #ddd;
  border-radius: 16px;
  background: white;
  color: var(--text-light);
  font-size: 13px;
  cursor: pointer;
}
.request-card .req-status {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 10px;
}
.req-status.pending { background: #FFF3E0; color: #E65100; }
.req-status.accepted { background: #E8F5E9; color: #2E7D32; }
.req-status.declined { background: #FFEBEE; color: #C62828; }

/* Friend meals view */
.friend-meals-view { display: none; padding: 16px; }
.friend-meals-view.active { display: block; }
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>
<body>

<div class="header">
  <h1>今天吃什么</h1>
  <div class="date" id="headerDate"></div>
</div>

<!-- Update Banner -->
<div class="update-banner" id="updateBanner">
  <div class="update-info">
    <div class="update-title" id="updateTitle">发现新版本</div>
    <div class="update-desc" id="updateDesc">点击立即更新</div>
  </div>
  <button class="btn-update" onclick="startUpdate()">立即更新</button>
  <button class="btn-close-update" onclick="dismissUpdate()">×</button>
</div>

<div class="tabs">
  <button class="tab active" data-tab="records">记录</button>
  <button class="tab" data-tab="wheel">转盘</button>
  <button class="tab" data-tab="social">好友</button>
  <button class="tab" data-tab="stats">统计</button>
</div>

<!-- Records Page -->
<div class="page active" id="page-records">
  <div id="mealList"></div>
</div>

<!-- Wheel Page -->
<div class="page" id="page-wheel">
  <div class="wheel-container">
    <div class="wheel-wrapper">
      <canvas class="wheel-canvas" id="wheelCanvas" width="600" height="600"></canvas>
      <div class="wheel-center">?</div>
    </div>
    <button class="btn-spin" id="btnSpin" onclick="spinWheel()">转一转</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== Data =====
const STORAGE_KEY = 'meals';
const WHEEL_KEY = 'wheelFoods';

function getMeals() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}
function saveMeals(meals) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(meals));
}
function getWheelFoods() {
  const saved = localStorage.getItem(WHEEL_KEY);
  return saved ? JSON.parse(saved) : ['火锅', '烧烤', '麻辣烫', '寿司', '汉堡', '面条', '饺子', '炒饭'];
}
function saveWheelFoods(foods) {
  localStorage.setItem(WHEEL_KEY, JSON.stringify(foods));
}

// ===== Date =====
function formatDate() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  return `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
}
function formatTime(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
document.getElementById('headerDate').textContent = formatDate();

// ===== Tabs =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.tab).classList.add('active');
  });
});

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== Modal =====
function openModal() {
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('mealName').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  resetForm();
}
function resetForm() {
  document.getElementById('mealName').value = '';
  document.getElementById('mealNote').value = '';
  currentPhoto = null;
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoUpload').classList.remove('has-image');
  document.getElementById('photoInput').value = '';
  document.querySelectorAll('.tag-option').forEach(t => t.classList.remove('selected'));
  document.querySelector('[data-tag="breakfast"]').classList.add('selected');
}

// Tag selection
document.querySelectorAll('.tag-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.tag-option').forEach(t => t.classList.remove('selected'));
    opt.classList.add('selected');
  });
});

// Photo upload
let currentPhoto = null;
document.getElementById('photoInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    // Compress image
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 800;
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = h * maxSize / w; w = maxSize; }
        else { w = w * maxSize / h; h = maxSize; }
      }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      currentPhoto = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById('photoPreview').src = currentPhoto;
      document.getElementById('photoUpload').classList.add('has-image');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
function removePhoto() {
  currentPhoto = null;
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoUpload').classList.remove('has-image');
  document.getElementById('photoInput').value = '';
}

// Save meal
function saveMeal() {
  const name = document.getElementById('mealName').value.trim();
  if (!name) { showToast('请输入吃了什么'); return; }
  const tag = document.querySelector('.tag-option.selected')?.dataset.tag || 'other';
  const note = document.getElementById('mealNote').value.trim();
  const meal = { id: Date.now(), name, tag, note, photo: currentPhoto, time: Date.now() };
  const meals = getMeals();
  meals.unshift(meal);
  saveMeals(meals);
  closeModal();
  renderMeals();
  showToast('记录成功!');
  // Sync to Firebase
  if (db && myCode) syncMealsToFirebase();
}

// Render meals
const tagLabels = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐', snack: '加餐', other: '其他' };
function renderMeals() {
  const meals = getMeals();
  const list = document.getElementById('mealList');
  if (meals.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">🍜</div><p>还没有记录<br>点击右下角 + 开始记录吧</p></div>';
    return;
  }
  // Group by date
  const groups = {};
  meals.forEach(m => {
    const d = new Date(m.time);
    const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });
  let html = '';
  for (const [key, items] of Object.entries(groups)) {
    const d = new Date(items[0].time);
    html += `<div class="history-date">${d.getMonth()+1}月${d.getDate()}日</div>`;
    items.forEach(m => {
      const time = new Date(m.time);
      const timeStr = `${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
      html += `<div class="meal-card">
        <button class="delete-btn" onclick="deleteMeal(${m.id})">×</button>
        <div class="meal-time">${timeStr}</div>
        <span class="meal-tag tag-${m.tag}">${tagLabels[m.tag] || '其他'}</span>
        <div class="meal-name">${escHtml(m.name)}</div>
        ${m.note ? `<div style="font-size:13px;color:#888;margin-top:4px">${escHtml(m.note)}</div>` : ''}
        ${m.photo ? `<img class="meal-img" src="${m.photo}" alt="食物照片">` : ''}
      </div>`;
    });
  }
  list.innerHTML = html;
}
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function deleteMeal(id) {
  if (!confirm('确定删除这条记录？')) return;
  const meals = getMeals().filter(m => m.id !== id);
  saveMeals(meals);
  renderMeals();
  showToast('已删除');
  if (db && myCode) syncMealsToFirebase();
}

// ===== Wheel =====
let wheelFoods = getWheelFoods();
let isSpinning = false;
let currentAngle = 0;

function renderWheelFoods() {
  const container = document.getElementById('foodTags');
  container.innerHTML = wheelFoods.map((f, i) =>
    `<div class="food-tag">${escHtml(f)}<button class="remove-food" onclick="removeWheelFood(${i})">×</button></div>`
  ).join('');
}
function addWheelFood() {
  const input = document.getElementById('foodInput');
  const val = input.value.trim();
  if (!val) return;
  if (wheelFoods.includes(val)) { showToast('已在列表中'); return; }
  wheelFoods.push(val);
  saveWheelFoods(wheelFoods);
  input.value = '';
  renderWheelFoods();
  drawWheel();
}
function removeWheelFood(i) {
  wheelFoods.splice(i, 1);
  saveWheelFoods(wheelFoods);
  renderWheelFoods();
  drawWheel();
}
document.getElementById('foodInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addWheelFood();
});

// Draw wheel
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const colors = ['#FF6B35','#FFA726','#FFCC02','#66BB6A','#42A5F5','#AB47BC','#EC407A','#8D6E63','#78909C','#26C6DA'];

let highlightIndex = -1;

function drawWheel(rotation) {
  if (rotation === undefined) rotation = currentAngle;
  const foods = wheelFoods;
  if (foods.length === 0) {
    ctx.clearRect(0, 0, 600, 600);
    ctx.fillStyle = '#eee';
    ctx.beginPath();
    ctx.arc(300, 300, 280, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#999';
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('请添加食物', 300, 300);
    return;
  }
  const n = foods.length;
  const arc = (Math.PI * 2) / n;
  ctx.clearRect(0, 0, 600, 600);
  ctx.save();
  ctx.translate(300, 300);
  ctx.rotate(rotation);

  for (let i = 0; i < n; i++) {
    const startAngle = i * arc - Math.PI / 2;
    const endAngle = startAngle + arc;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, 280, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();

    // Highlight the selected segment
    if (i === highlightIndex) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
    }

    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.rotate(startAngle + arc / 2);
    ctx.textAlign = 'center';
    ctx.fillStyle = 'white';
    ctx.font = n > 8 ? 'bold 20px sans-serif' : 'bold 26px sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.2)';
    ctx.shadowBlur = 4;
    const text = foods[i].length > 6 ? foods[i].slice(0, 6) + '…' : foods[i];
    ctx.fillText(text, 160, 8);
    ctx.restore();
  }
  ctx.restore();

  // Draw pointer at top (exact same coordinate as the formula uses: -PI/2 = top of circle)
  const px = 300, py = 300 - 280; // tip at wheel edge, pointing down into wheel
  ctx.save();
  ctx.translate(px, py);
  ctx.beginPath();
  ctx.moveTo(0, 0);       // tip (pointing down into wheel)
  ctx.lineTo(-14, -22);   // left base
  ctx.lineTo(14, -22);    // right base
  ctx.closePath();
  ctx.fillStyle = '#FF6B35';
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

// ---- Touch/drag spin ----
let dragState = null; // { startAngle, lastAngle, lastTime, velocity }
let flingRaf = null;

function getPointerAngle(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const touch = e.touches ? e.touches[0] : e;
  return Math.atan2(touch.clientY - cy, touch.clientX - cx);
}

function onPointerDown(e) {
  if (isSpinning) return;
  if (wheelFoods.length === 0) return;
  if (flingRaf) { cancelAnimationFrame(flingRaf); flingRaf = null; }
  e.preventDefault();
  const angle = getPointerAngle(e);
  dragState = { startAngle: angle, lastAngle: angle, lastTime: performance.now(), velocity: 0 };
}

function onPointerMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const angle = getPointerAngle(e);
  const now = performance.now();
  let delta = angle - dragState.lastAngle;
  // Handle wrap-around
  if (delta > Math.PI) delta -= Math.PI * 2;
  if (delta < -Math.PI) delta += Math.PI * 2;
  currentAngle += delta;
  drawWheel();

  const dt = now - dragState.lastTime;
  if (dt > 0) {
    // Smooth velocity with exponential moving average
    dragState.velocity = dragState.velocity * 0.5 + (delta / dt) * 1000 * 0.5;
  }
  dragState.lastAngle = angle;
  dragState.lastTime = now;
}

function onPointerUp(e) {
  if (!dragState) return;
  e.preventDefault();
  const velocity = dragState.velocity;
  dragState = null;
  if (Math.abs(velocity) < 0.3) return; // Too slow, just stop

  // Fling: decelerate naturally
  highlightIndex = -1;
  isSpinning = true;
  document.getElementById('btnSpin').disabled = true;
  document.getElementById('wheelResult').textContent = '';

  let vel = velocity;
  const friction = 0.97;
  const minVel = 0.05;
  let lastTime = performance.now();

  function flingAnimate(now) {
    const dt = (now - lastTime) / 1000; // seconds
    lastTime = now;
    // Apply friction per frame at ~60fps equivalence
    const frames = dt * 60;
    vel *= Math.pow(friction, frames);
    currentAngle += vel * dt;
    drawWheel();

    if (Math.abs(vel) > minVel) {
      flingRaf = requestAnimationFrame(flingAnimate);
    } else {
      flingRaf = null;
      onSpinEnd();
    }
  }
  lastTime = performance.now();
  flingRaf = requestAnimationFrame(flingAnimate);
}

// Mouse events
canvas.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
// Touch events
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
window.addEventListener('touchmove', onPointerMove, { passive: false });
window.addEventListener('touchend', onPointerUp);

// ---- Determine result when spin stops ----
function getSelectedFood(angle) {
  if (wheelFoods.length === 0) return null;
  const n = wheelFoods.length;
  const arc = (Math.PI * 2) / n;
  // Pointer is at top: screen angle -PI/2 from center.
  // Canvas is rotated by `angle`, so in wheel-local coords the pointer is at: -PI/2 - angle.
  // Segment 0 starts at -PI/2 in local coords, so shift by +PI/2 to make segment 0 start at 0.
  let localAngle = (-angle - Math.PI / 2) % (Math.PI * 2);
  if (localAngle < 0) localAngle += Math.PI * 2;
  const index = Math.floor(localAngle / arc) % n;
  return { food: wheelFoods[index], index: index };
}

function showResult(result) {
  if (result) {
    highlightIndex = result.index;
    drawWheel();
    document.getElementById('wheelResult').textContent = `就吃 ${result.food}！`;
    showToast(`今天吃 ${result.food}！`);
  }
}

function animateToAngle(targetAngle, duration, callback) {
  const startAngle = currentAngle;
  const startTime = performance.now();
  const distance = targetAngle - startAngle;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function step(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + distance * easeOut(t);
    drawWheel();

    if (t < 1) {
      flingRaf = requestAnimationFrame(step);
    } else {
      currentAngle = targetAngle;
      drawWheel();
      flingRaf = null;
      if (callback) callback();
    }
  }
  flingRaf = requestAnimationFrame(step);
}

function onSpinEnd() {
  isSpinning = false;
  document.getElementById('btnSpin').disabled = false;
  showResult(getSelectedFood(currentAngle));
}

// Button spin: pick result first, then animate to it
function spinWheel() {
  if (isSpinning || wheelFoods.length === 0) {
    if (wheelFoods.length === 0) showToast('请先添加食物');
    return;
  }
  isSpinning = true;
  highlightIndex = -1;
  document.getElementById('btnSpin').disabled = true;
  document.getElementById('wheelResult').textContent = '';

  const n = wheelFoods.length;
  const arc = (Math.PI * 2) / n;

  // Pick a random food
  const selectedIndex = Math.floor(Math.random() * n);

  // Calculate target angle so selected segment's center lands at pointer (top).
  // getSelectedFood(a) returns index i when: floor((-a - PI/2) % 2PI / arc) = i
  // So we need: -targetAngle - PI/2 = selectedIndex * arc  (mod 2PI)
  // => targetAngle = -selectedIndex * arc - PI/2 + fullSpins * 2PI
  // relativeAngle = targetAngle - currentAngle
  const fullSpins = 5 + Math.floor(Math.random() * 3);
  const absoluteTarget = -selectedIndex * arc - Math.PI / 2 + fullSpins * Math.PI * 2;
  const relativeAngle = absoluteTarget - currentAngle;

  const duration = 3500 + Math.random() * 1500;

  animateToAngle(currentAngle + relativeAngle, duration, () => {
    isSpinning = false;
    document.getElementById('btnSpin').disabled = false;
    showResult(getSelectedFood(currentAngle));
  });
}

// ===== Stats =====
function renderStats() {
  const meals = getMeals();
  document.getElementById('totalMeals').textContent = meals.length;
  const days = new Set(meals.map(m => {
    const d = new Date(m.time);
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }));
  document.getElementById('totalDays').textContent = days.size;

  const historyList = document.getElementById('historyList');
  if (meals.length === 0) {
    historyList.innerHTML = '<div style="text-align:center;color:#999;padding:20px">暂无记录</div>';
    return;
  }
  const recent = meals.slice(0, 20);
  let html = '';
  let lastDate = '';
  recent.forEach(m => {
    const d = new Date(m.time);
    const dateKey = `${d.getMonth()+1}月${d.getDate()}日`;
    if (dateKey !== lastDate) {
      html += `<div class="history-date">${dateKey}</div>`;

// ===== Auto Update =====
const APP_VERSION = '1.5';
// Replace with your GitHub repo: https://raw.githubusercontent.com/{owner}/{repo}/main/version.json
// Supports multiple mirror URLs separated by | for China users
const UPDATE_CHECK_URL = 'https://mirror.ghproxy.cc/https://raw.githubusercontent.com/clea001/jintianchishenme/main/www/version.json|https://raw.githubusercontent.com/clea001/jintianchishenme/main/www/version.json';

// Compare version strings (e.g. "1.2.0" vs "1.1.0")
function isNewerVersion(remote, local) {
  const r = remote.split('.').map(Number);
  const l = local.split('.').map(Number);
  for (let i = 0; i < Math.max(r.length, l.length); i++) {
    const rv = r[i] || 0;
    const lv = l[i] || 0;
    if (rv > lv) return true;
    if (rv < lv) return false;
  }
  return false;
}

let pendingDownloadUrls = [];
let updateInfo = null;

async function checkForUpdate() {
  if (!UPDATE_CHECK_URL) return;
  const urls = UPDATE_CHECK_URL.split('|');
  for (const url of urls) {
    try {
      const resp = await fetch(url.trim() + '?t=' + Date.now(), { signal: AbortSignal.timeout(8000) });
      const info = await resp.json();
      if (info.version && isNewerVersion(info.version, APP_VERSION)) {
        updateInfo = info;
        // Collect all download URLs: mirror first, then fallback
        pendingDownloadUrls = [];
        if (info.downloadUrl) pendingDownloadUrls.push(info.downloadUrl);
        if (info.downloadUrlFallback) pendingDownloadUrls.push(info.downloadUrlFallback);
        document.getElementById('updateTitle').textContent = `发现新版本 v${info.version}`;
        document.getElementById('updateDesc').textContent = (info.changelog || '点击立即更新').replace(/\\n/g, ' ');
        document.getElementById('updateBanner').classList.add('show');
      }
      return; // Success, stop trying other URLs
    } catch (e) {
      continue; // Try next mirror
    }
  }
}

function dismissUpdate() {
  document.getElementById('updateBanner').classList.remove('show');
}

async function startUpdate() {
  if (pendingDownloadUrls.length === 0) return;

  document.getElementById('updateBanner').classList.remove('show');
  document.getElementById('updateProgress').classList.add('show');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = '正在连接...';

  // Try native plugin first
  if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AppUpdate) {
    // Listen for native download events
    const AppUpdate = window.Capacitor.Plugins.AppUpdate;

    AppUpdate.addListener('downloadComplete', () => {
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = '下载完成，正在安装...';
      setTimeout(() => document.getElementById('updateProgress').classList.remove('show'), 3000);
    });

    AppUpdate.addListener('downloadFailed', (data) => {
      document.getElementById('progressText').textContent = '下载失败: ' + (data.error || '未知错误');
      setTimeout(() => document.getElementById('updateProgress').classList.remove('show'), 3000);
    });

    // Simulate progress while downloading
    let progress = 0;
    const progressInterval = setInterval(() => {
      progress += Math.random() * 8;
      if (progress > 85) progress = 85;
      document.getElementById('progressBar').style.width = progress + '%';
      document.getElementById('progressText').textContent = '正在下载... ' + Math.round(progress) + '%';
    }, 800);

    // Stop progress simulation when download completes
    AppUpdate.addListener('downloadComplete', () => clearInterval(progressInterval));
    AppUpdate.addListener('downloadFailed', () => clearInterval(progressInterval));

    for (const url of pendingDownloadUrls) {
      try {
        await AppUpdate.downloadAndInstall({ url: url });
        return; // Download started successfully
      } catch (e) {
        continue;
      }
    }
  }

  // Fallback: open in browser (use mirror first)
  document.getElementById('updateProgress').classList.remove('show');
  window.open(pendingDownloadUrls[0], '_system');
}

// Listen for incoming requests
function listenRequests() {
  if (!db || !myCode) return;
  db.ref('requests/' + myCode).orderByChild('time').limitToLast(20).on('value', (snap) => {
    const reqs = snap.val() || {};
    const list = document.getElementById('requestsList');
    const section = document.getElementById('requestsSection');
    const entries = Object.entries(reqs).reverse();

    if (entries.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    let html = '';
    for (const [id, req] of entries) {
      const time = new Date(req.time);
      const timeStr = `${time.getMonth()+1}/${time.getDate()} ${time.getHours().toString().padStart(2,'0')}:${time.getMinutes().toString().padStart(2,'0')}`;
      const statusClass = req.status || 'pending';
      const statusText = { pending: '待回应', accepted: '已接受', declined: '已拒绝' }[statusClass];

      html += `<div class="request-card">
        <div class="req-header">
          <span class="req-from">${escHtml(req.fromName || '好友')} 的点菜</span>
          <span class="req-status ${statusClass}">${statusText}</span>
        </div>
        <div class="req-dish">${escHtml(req.dish)}</div>
        <div style="font-size:12px;color:#999">${timeStr}</div>`;
      if (statusClass === 'pending') {
        html += `<div class="req-actions">
          <button class="btn-accept" onclick="respondRequest('${id}','${escHtml(req.from)}','accepted','${escHtml(req.dish)}')">做！</button>
          <button class="btn-decline" onclick="respondRequest('${id}','${escHtml(req.from)}','declined','${escHtml(req.dish)}')">不做</button>
        </div>`;
      }
      html += '</div>';
    }
    list.innerHTML = html;
  });
}

function respondRequest(reqId, fromCode, status, dish) {
  if (!db) return;
  db.ref('requests/' + myCode + '/' + reqId + '/status').set(status);

  // Notify via chat
  const chatId = getChatId(myCode, fromCode);
  const text = status === 'accepted'
    ? `✅ 好的，我来做「${dish}」！`
    : `❌ 这个做不了呀，换个别的吧`;
  db.ref('chats/' + chatId).push({
    from: myCode,
    text: text,
    time: firebase.database.ServerValue.TIMESTAMP
  });

  showToast(status === 'accepted' ? '已接受点菜' : '已拒绝');
}
